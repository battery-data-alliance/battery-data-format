name: Update ontology snapshot

on:
  pull_request:
    branches:
      - main

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package with dev deps
        run: uv sync --extra dev

      - name: Update ontology snapshot
        run: uv run python -c "from bdf.spec import ColumnOntology; ColumnOntology.get_snapshot()"

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/bdf/data/bdf-ontology-snapshot.ttl \
            || git commit -am "chore: update bundled ontology snapshot"
          git push
